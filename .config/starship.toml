add_newline = true
palette = "terminal"
format = """
[╭─](fg:line)$directory$git_branch$git_status$python$nodejs$java$golang$rust$docker_context$cmd_duration
[╰─](fg:line)$character"""

[palettes.terminal]
bg = "#303446"
fg = "#c6d0f5"
line = "#626880"
green = "#a6d189"
red = "#e78284"
yellow = "#e5c890"
blue = "#8caaee"
purple = "#ca9ee6"
muted = "#a5adce"

[character]
success_symbol = "[❯](bold fg:green)"
error_symbol = "[❯](bold fg:red)"
vimcmd_symbol = "[❮](bold fg:yellow)"

[directory]
style = "bold fg:blue"
read_only = " ro"
truncation_length = 4
truncate_to_repo = false
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = "git "
style = "fg:purple"
format = "[$symbol$branch]($style) "

[git_status]
style = "fg:yellow"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "!"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = ""
untracked = "?${count}"
stashed = "$${count}"
modified = "~${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "x${count}"

[cmd_duration]
min_time = 1000
style = "fg:muted"
format = "took [$duration]($style) "

[python]
symbol = "py "
style = "fg:yellow"
format = "[$symbol$version]($style) "

[nodejs]
symbol = "node "
style = "fg:green"
format = "[$symbol$version]($style) "

[java]
symbol = "java "
style = "fg:red"
format = "[$symbol$version]($style) "

[golang]
symbol = "go "
style = "fg:blue"
format = "[$symbol$version]($style) "

[rust]
symbol = "rs "
style = "fg:red"
format = "[$symbol$version]($style) "

[docker_context]
symbol = "docker "
style = "fg:blue"
format = "[$symbol$context]($style) "
