##############################
#  FONT & TEXT
##############################

font_family JetBrainsMono Nerd Font

font_size        18.0
adjust_line_height  2
adjust_column_width 0

# Slightly nicer looking text
disable_ligatures never
hinting            full
text_composition_strategy 1

##############################
#  WINDOW & PADDING
##############################

enabled_layouts splits,stack

# 85% opacity
background_opacity 0.85

# Window padding inside the terminal
window_padding_width  16
window_margin_width   6

# Rounded corners & margins work best with a compositor (picom etc.)
# (kitty handles rounded corners itself in newer versions)

# Hide window decorations for a cleaner look
window_decorations none
confirm_os_window_close 0
##############################
#  CURSOR & MOUSE
##############################

cursor_shape       block
cursor_blink_interval 0
cursor_trail       0
cursor_stop_blinking_after 0

mouse_hide_wait    2.0
copy_on_select     clipboard

##############################
#  SCROLLBACK
##############################

scrollback_lines           10000
scrollback_pager           less
scrollback_pager_history_size 0

# Faster but still smooth scrolling
wheel_scroll_multiplier 3.0

##############################
#  TAB BAR
##############################

tab_bar_edge            bottom
tab_bar_style           slant
tab_bar_min_tabs        1
tab_title_template "{index}: {title}"

active_tab_foreground   #cdd6f4
active_tab_background   #074975
inactive_tab_foreground #6c7086
inactive_tab_background #181825

##############################
#  BELL & VISUAL FEEDBACK
##############################

enable_audio_bell no
visual_bell_duration 0.15
visual_bell_color #f38ba8

##############################
#  CATPPUCCIN MOCHA THEME
##############################

foreground            #cdd6f4
background            #1e1e2e
selection_foreground  #1e1e2e
selection_background  #cdd6f4

cursor                #f5e0dc
cursor_text_color     #1e1e2e

url_color             #f5e0dc

# Black
color0  #45475a
color8  #585b70

# Red
color1  #f38ba8
color9  #f38ba8

# Green
color2  #a6e3a1
color10 #a6e3a1

# Yellow
color3  #f9e2af
color11 #f9e2af

# Blue
color4  #89b4fa
color12 #89b4fa

# Magenta
color5  #f5c2e7
color13 #f5c2e7

# Cyan
color6  #94e2d5
color14 #94e2d5

# White
color7  #bac2de
color15 #a6adc8

##############################
#  WINDOW BORDERS
##############################

active_border_color   #89b4fa
inactive_border_color #313244
border_width          2.0

##############################
#  QUALITY OF LIFE KEYBINDINGS
##############################
# kitty uses ctrl+shift by default a lot

# New window/tab
map ctrl+shift+enter  launch --cwd=current --keep-focus bash -lc 'kitty --detach --directory="$(pwd)"'
map ctrl+shift+t      new_tab
map ctrl+shift+w      close_window
map ctrl+shift+q      close_tab

# Navigate tabs
map ctrl+shift+right  next_tab
map ctrl+shift+left   previous_tab

# ─ Splits ─────────────────────────────────────────────
# NOTE:
#   hsplit = horizontal bar = top/bottom panes
#   vsplit = vertical bar   = left/right panes

# Top/bottom split
map ctrl+shift+up     launch --cwd=current --location=hsplit

# Left/right split
map ctrl+shift+down   launch --cwd=current --location=vsplit

# 👉 Navigate between splits (hjkl, like vim)
map ctrl+shift+h      neighboring_window left
map ctrl+shift+l      neighboring_window right
map ctrl+shift+j      neighboring_window down
map ctrl+shift+k      neighboring_window up

# Scrollback with keyboard (moved off hjkl to avoid conflicts)
map ctrl+shift+page_up   scroll_page_up
map ctrl+shift+page_down scroll_page_down

# Search in scrollback
map ctrl+shift+f      search_in_scrollback

##############################
#  STARTUP
##############################

# Start in login shell
shell_integration enabled
startup_session none

allow_remote_control yes

##############################
#  TABS – Catppuccin Powerline
##############################

# Put tabs at the bottom (change to "top" if you prefer)
tab_bar_edge bottom

# Powerline-style tabs
tab_bar_style powerline
tab_powerline_style angled
tab_bar_align left
tab_bar_min_tabs 1

# Tab bar background & margins (space around the bar)
# mocha mantle
tab_bar_background #181825

tab_bar_margin_width 4.0
# top bottom
tab_bar_margin_height 2.0 0.0

# Active/inactive tab colors (Catppuccin Mocha)
# blue
active_tab_background #89b4fa
# crust (dark text on bright tab)
active_tab_foreground #11111b

# mantle
inactive_tab_background #181825
# subtext0
inactive_tab_foreground #a6adc8

# Show a dot if something happens in a background tab
tab_activity_symbol "•"
bell_on_tab yes

# Tab title: superscript index + folder name
tab_title_template "{index}: {title}"
tab_title_max_length 40

