# Fonts
font_family JetBrains Mono
bold_font auto
italic_font auto
bold_italic_font auto
font_size 13.0
disable_ligatures never

# Window
remember_window_size no
initial_window_width 104c
initial_window_height 32c
window_padding_width 10 12
window_margin_width 0
window_border_width 1pt
hide_window_decorations yes
placement_strategy center
enabled_layouts splits,tall,stack

# Background and focus
background_opacity 0.93
background_image ~/.config/wallpapers/ghibli-background-1.png
background_image_layout cscaled
background_image_linear yes
background_tint 0.90
background_tint_gaps 0.96
dynamic_background_opacity yes
inactive_text_alpha 0.78
dim_opacity 0.62

# Cursor
cursor_shape beam
cursor_beam_thickness 1.6
cursor_blink_interval 0
cursor_stop_blinking_after 0

# Scrolling and links
scrollback_lines 20000
wheel_scroll_multiplier 4.0
touch_scroll_multiplier 1.0
detect_urls yes
url_style curly
open_url_with default
mouse_hide_wait 2.0

# Clipboard and terminal behaviour
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell no
confirm_os_window_close 0
copy_on_select yes
strip_trailing_spaces smart
terminfo_type path
shell_integration enabled

# Tabs
tab_bar_edge top
tab_bar_margin_width 4
tab_bar_margin_height 4 0
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_align left
tab_bar_min_tabs 1
tab_switch_strategy previous
tab_title_template "  {index}: {title}  "
active_tab_font_style bold
inactive_tab_font_style normal

# Key mappings
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+w close_window
map ctrl+shift+q close_tab
map ctrl+shift+left previous_tab
map ctrl+shift+right next_tab
map ctrl+shift+comma move_tab_backward
map ctrl+shift+period move_tab_forward
map ctrl+shift+r set_tab_title
map ctrl+shift+e open_url_with_hints
map ctrl+shift+s show_scrollback
map ctrl+shift+backslash launch --location=vsplit --cwd=current
map ctrl+shift+minus launch --location=hsplit --cwd=current

# Palette
background #151819
foreground #ebdbb2
selection_background #504945
selection_foreground #fbf1c7
cursor #8ec07c
cursor_text_color #151819
url_color #83a598
active_border_color #8ec07c
inactive_border_color #3c3836
bell_border_color #fb4934

active_tab_background #8ec07c
active_tab_foreground #151819
inactive_tab_background #282828
inactive_tab_foreground #a89984
tab_bar_background #151819

color0 #151819
color1 #fb4934
color2 #8ec07c
color3 #fabd2f
