# Fonts
font_family JetBrains Mono
bold_font auto
italic_font auto
bold_italic_font auto
font_size 13.0
disable_ligatures never

# Window
remember_window_size no
initial_window_width 104c
initial_window_height 32c
window_padding_width 10 12
window_margin_width 0
window_border_width 1pt
hide_window_decorations yes
placement_strategy center
enabled_layouts splits,tall,stack

# Background and focus
background_opacity 0.93
dynamic_background_opacity yes
inactive_text_alpha 0.78
dim_opacity 0.62

# Cursor
cursor_shape beam
cursor_beam_thickness 1.6
cursor_blink_interval 0
cursor_stop_blinking_after 0

# Scrolling and links
scrollback_lines 20000
wheel_scroll_multiplier 4.0
touch_scroll_multiplier 1.0
detect_urls yes
url_style curly
open_url_with default
mouse_hide_wait 2.0

# Clipboard and terminal behaviour
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell no
confirm_os_window_close 0
copy_on_select yes
strip_trailing_spaces smart
terminfo_type path
shell_integration enabled

# Tabs
tab_bar_edge top
tab_bar_margin_width 4
tab_bar_margin_height 4 0
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_align left
tab_bar_min_tabs 1
tab_switch_strategy previous
tab_title_template "  {index}: {title}  "
active_tab_font_style bold
inactive_tab_font_style normal

# Key mappings
map ctrl+c copy_or_interrupt
map ctrl+v paste_from_clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+w close_window
map ctrl+shift+q close_tab
map ctrl+shift+left previous_tab
map ctrl+shift+right next_tab
map ctrl+shift+comma move_tab_backward
map ctrl+shift+period move_tab_forward
map ctrl+shift+r set_tab_title
map ctrl+shift+e open_url_with_hints
map ctrl+shift+s show_scrollback
map ctrl+shift+backslash launch --location=vsplit --cwd=current
map ctrl+shift+minus launch --location=hsplit --cwd=current

# Catppuccin Frappe
background #303446
foreground #c6d0f5
selection_background #626880
selection_foreground #c6d0f5
cursor #f2d5cf
cursor_text_color #303446
url_color #f2d5cf
active_border_color #babbf1
inactive_border_color #737994
bell_border_color #e78284

active_tab_background #ca9ee6
active_tab_foreground #232634
inactive_tab_background #292c3c
inactive_tab_foreground #a5adce
tab_bar_background #232634

