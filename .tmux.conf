##### TERMINAL ###########################################################

set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-kitty:Tc"

# Mouse support
set -g mouse on

# Index windows/panes from 1
set -g base-index 1
setw -g pane-base-index 1

# Use vim-style keys in copy mode
set -g mode-keys vi


##### COLORS (Catppuccin Mocha) ##########################################

# base      #1e1e2e
# mantle    #181825
# crust     #11111b
# text      #cdd6f4
# subtext0  #a6adc8
# surface0  #313244
# blue      #89b4fa
# red       #f38ba8


##### STATUS BAR – POWERLINE #############################################

set -g status on
set -g status-interval 2

# Overall bar background + text
set -g status-style "bg=#181825,fg=#a6adc8"

# LEFT: fancy session block
set -g status-left-length 60
set -g status-left '#[bg=#89b4fa,fg=#11111b,bold]  #S #[bg=#181825,fg=#89b4fa] '

# RIGHT: time + date with reverse powerline
set -g status-right-length 80
set -g status-right '#[fg=#313244,bg=#181825]#[bg=#313244,fg=#cdd6f4]  %H:%M   %d %b %Y '

# Window titles
setw -g window-status-style "bg=#181825,fg=#a6adc8"
setw -g window-status-format " #I:#W "

# Active window highlighted with powerline blocks
setw -g window-status-current-style "bg=#89b4fa,fg=#11111b,bold"
setw -g window-status-current-format '#[bg=#181825,fg=#89b4fa]#[bg=#89b4fa,fg=#11111b,bold] #I:#W #[bg=#181825,fg=#89b4fa]'


##### PANES & BORDERS ####################################################

set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

set -g display-panes-active-colour "#89b4fa"
set -g display-panes-colour "#313244"


##### MESSAGES / COPY MODE ###############################################

set -g message-style "bg=#89b4fa,fg=#11111b"
set -g mode-style "bg=#89b4fa,fg=#11111b"


##### KEYBINDINGS ########################################################

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"

# Splits
bind | split-window -h
bind - split-window -v

# Vim-style pane navigation with Alt + hjkl
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Resize panes with Alt + Shift + hjkl
bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 5
bind -n M-K resize-pane -U 5
bind -n M-L resize-pane -R 5

# Copy-mode helpers
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

